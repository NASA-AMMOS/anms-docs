name: Build documentation

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches:
      - main
  pull_request: {} # any target

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up OS
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              cmake make coreutils \
              ruby asciidoctor graphviz plantuml inkscape \
              dblatex xmlstarlet aspell
          sudo gem install \
              asciidoctor-diagram \
              'asciidoctor-diagram-plantuml:~>1.2024.8'
      - name: Build
        env:
          DESTDIR: public
        run: ./build.sh
      - uses: actions/upload-artifact@v7
        with:
          name: docs
          path: public
      - uses: actions/upload-artifact@v7
        with:
          archive: false
          path: public/product-guide/anms-product-guide.pdf
      - uses: actions/upload-artifact@v7
        with:
          archive: false
          path: public/user-guide/anms-user-guide.pdf

  deploy:
    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write
    # Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
    # However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docs
          path: public
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
